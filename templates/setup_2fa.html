{% extends 'base.html' %}

{% block title %}Setup 2FA – Finova{% endblock %}

{% block content %}
<section class="flex min-h-screen items-center justify-center px-4 py-12">
    <div class="w-full max-w-lg space-y-6 rounded-3xl bg-slate-900/70 p-10 shadow-2xl">
        <h2 class="text-2xl font-semibold text-white">Set up your 2FA</h2>
        <p class="text-sm text-slate-400">Scan the QR code with your authenticator app or copy the secret key.</p>
        <div class="space-y-4">
            <div class="rounded-2xl border border-white/10 bg-slate-950/50 p-4 text-sm text-slate-300">
                <p class="text-xs uppercase text-slate-500">Secret key</p>
                <p class="mt-1 font-semibold text-white">{{ secret }}</p>
            </div>
            <div class="rounded-2xl border border-white/10 bg-slate-950/50 p-4 text-center">
                <img src="data:image/png;base64,{{ qr_code }}" alt="QR code" class="mx-auto h-40 w-40" />
                <p class="mt-3 text-xs uppercase text-slate-500">Scan QR in Google Authenticator</p>
            </div>
        </div>
        <div class="flex items-center justify-between">
            <a href="/settings" class="text-sm font-semibold text-accent">Back to settings</a>
            <a href="/verify-2fa" class="rounded-2xl border border-white/20 px-5 py-2 text-sm font-semibold text-white">Verify</a>
        </div>
    </div>
</section>
{% endblock %}
