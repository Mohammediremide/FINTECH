{% extends 'base.html' %}

{% block title %}Cards � Finova{% endblock %}

{% block content %}
<section class="flex min-h-screen flex-col gap-6 px-6 py-10">
    <div class="flex items-center justify-between">
        <div>
            <p class="text-sm uppercase tracking-[0.4em] text-slate-500">Cards</p>
            <h1 class="text-3xl font-bold text-white">My Finova Card</h1>
        </div>
        <a href="/" class="text-sm font-semibold text-accent">Dashboard</a>
    </div>
    <div class="space-y-6">
        <div class="credit-card relative m-auto w-full max-w-md space-y-4 rounded-3xl bg-gradient-to-br from-slate-900 to-slate-800 p-6 shadow-[0_20px_60px_rgba(2,6,23,0.6)]">
            <div class="flex items-center justify-between text-sm text-slate-300">
                <span class="uppercase tracking-[0.4em]">Finova</span>
                <span class="text-xs text-emerald-400">Active</span>
            </div>
            <div class="text-sm text-slate-200">{{ 'Debit � NGN' }}</div>
            <div class="card-number text-2xl font-semibold tracking-[0.4em] text-white">**** **** **** 4289</div>
            <div class="grid grid-cols-2 gap-4 text-sm text-slate-300">
                <div>
                    <p class="text-[0.65rem] uppercase tracking-[0.4em]">Cardholder</p>
                    <p id="card-user-name" class="font-semibold text-white">Loading...</p>
                </div>
                <div>
                    <p class="text-[0.65rem] uppercase tracking-[0.4em]">Expires</p>
                    <p class="font-semibold text-white">12/28</p>
                </div>
            </div>
            <div class="card-bottom flex items-center justify-between text-[0.65rem] uppercase tracking-[0.4em] text-slate-300">
                <span>Finova</span>
                <span>NG</span>
            </div>
        </div>
        <div class="flex flex-wrap items-center justify-center gap-3">
            <button id="freeze-card-btn"
                class="rounded-2xl border border-white/10 px-6 py-3 text-sm font-semibold uppercase tracking-[0.3em] text-white transition hover:border-accent">Freeze Card</button>
            <button id="view-card-details-btn"
                class="rounded-2xl bg-gradient-to-r from-accent to-accent-secondary px-6 py-3 text-sm font-semibold uppercase tracking-[0.3em] text-slate-950">View Details</button>
        </div>
    </div>
</section>
{% endblock %}
