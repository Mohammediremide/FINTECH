{% extends 'base.html' %}

{% block title %}Verify 2FA � Finova{% endblock %}

{% block content %}
<section class="flex min-h-screen items-center justify-center px-4 py-12">
    <div class="w-full max-w-md space-y-6 rounded-3xl bg-slate-900/70 p-10 shadow-2xl">
        <h2 class="text-2xl font-semibold text-white">Two-factor authentication</h2>
        <p class="text-sm text-slate-400">Enter the code from your authenticator app to continue.</p>
        <form action="/verify-2fa" method="POST" class="space-y-4">
            <input type="text" name="token" maxlength="6" required placeholder="Enter 2FA code"
                class="w-full rounded-2xl border border-white/10 bg-slate-950/60 px-4 py-3 text-sm text-white focus:border-accent focus:outline-none" />
            <button type="submit"
                class="w-full rounded-2xl bg-gradient-to-r from-accent to-accent-secondary py-3 text-sm font-semibold text-slate-950">Verify</button>
        </form>
        <p class="text-center text-xs text-slate-400">Lost access? Contact support to reset your authenticator.</p>
    </div>
</section>
{% endblock %}
