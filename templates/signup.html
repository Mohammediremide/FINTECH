{% extends 'base.html' %}

{% block title %}Sign Up � Finova{% endblock %}

{% block content %}
<section class="flex min-h-screen items-center justify-center px-4 py-12">
    <div class="w-full max-w-md space-y-8 rounded-3xl bg-[rgba(15,23,42,0.75)] p-10 shadow-2xl backdrop-blur-xl">
        <div class="text-center space-y-3">
            <img src="/static/company_hero.png" alt="Finova Hero" class="mx-auto h-16 w-16 rounded-2xl shadow-lg" />
            <h2 class="text-3xl font-semibold tracking-tight text-white">Create your account</h2>
            <p class="text-sm text-slate-300">Join Finova to track your goals and stay on top of every penny.</p>
        </div>
        <form action="/signup" method="POST" class="space-y-5 pt-4">
            <div class="space-y-2">
                <label class="text-sm font-medium text-slate-200">Full Name</label>
                <input type="text" name="name" required placeholder="Odewunmi Mohammed"
                    class="w-full rounded-2xl border border-slate-700 bg-slate-900 px-4 py-3 text-sm text-white focus:border-accent focus:outline-none" />
            </div>
            <div class="space-y-2">
                <label class="text-sm font-medium text-slate-200">Email Address</label>
                <input type="email" name="email" required placeholder="you@example.com"
                    class="w-full rounded-2xl border border-slate-700 bg-slate-900 px-4 py-3 text-sm text-white focus:border-accent focus:outline-none" />
            </div>
            <div class="space-y-2">
                <label class="text-sm font-medium text-slate-200">Password</label>
                <input type="password" name="password" required placeholder="��������"
                    class="w-full rounded-2xl border border-slate-700 bg-slate-900 px-4 py-3 text-sm text-white focus:border-accent focus:outline-none" />
            </div>
            <button type="submit"
                class="w-full rounded-2xl bg-gradient-to-r from-accent to-accent-secondary py-3 text-sm font-semibold text-slate-950 transition hover:brightness-110">
                Get Started
            </button>
        </form>
        <p class="text-center text-xs text-slate-400">
            Already have an account?
            <a href="/login" class="font-semibold text-white underline-offset-4 hover:text-accent">Sign In</a>
        </p>
    </div>
</section>
{% endblock %}
