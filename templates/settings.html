{% extends 'base.html' %}

{% block title %}Settings � Finova{% endblock %}

{% block content %}
<section class="flex min-h-screen flex-col gap-6 px-6 py-10">
    <div class="flex items-center justify-between">
        <div>
            <p class="text-sm uppercase tracking-[0.4em] text-slate-500">Settings</p>
            <h1 class="text-3xl font-bold text-white">Account preferences</h1>
        </div>
        <a href="/" class="text-sm font-semibold text-accent">Dashboard</a>
    </div>
    <div class="grid gap-6 lg:grid-cols-2">
        <div class="rounded-3xl bg-slate-900/70 p-6 shadow-2xl">
            <h2 class="text-lg font-semibold">Personal information</h2>
            <form class="mt-6 space-y-4">
                <div class="space-y-1">
                    <label class="text-xs font-semibold uppercase tracking-[0.4em] text-slate-400">Name</label>
                    <input id="settings-name" type="text"
                        class="w-full rounded-2xl border border-white/10 bg-slate-950/60 px-4 py-3 text-sm text-white focus:border-accent focus:outline-none" />
                </div>
                <div class="space-y-1">
                    <label class="text-xs font-semibold uppercase tracking-[0.4em] text-slate-400">Email</label>
                    <input id="settings-email" type="email"
                        class="w-full rounded-2xl border border-white/10 bg-slate-950/60 px-4 py-3 text-sm text-white focus:border-accent focus:outline-none" />
                </div>
                <button type="button"
                    class="w-full rounded-2xl bg-gradient-to-r from-accent to-accent-secondary py-3 text-sm font-semibold text-slate-950">Save changes</button>
            </form>
        </div>
        <div class="rounded-3xl bg-slate-900/70 p-6 shadow-2xl">
            <div class="flex items-center justify-between">
                <div>
                    <p class="text-xs uppercase tracking-[0.4em] text-slate-400">Verification</p>
                    <h2 class="text-lg font-semibold text-white">2FA status</h2>
                </div>
                <button id="tfa-status-btn" class="rounded-full border border-white/20 px-4 py-2 text-xs font-semibold uppercase tracking-[0.3em]">Loading...</button>
            </div>
            <p class="mt-4 text-sm text-slate-300">Secure your account with a time-based authenticator.</p>
            <a href="/setup-2fa"
                class="mt-4 inline-flex items-center justify-center rounded-2xl border border-white/10 px-4 py-3 text-sm font-semibold text-white transition hover:border-accent">
                Run setup wizard
            </a>
        </div>
    </div>
</section>
{% endblock %}
