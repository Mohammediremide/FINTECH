{% extends 'base.html' %}

{% block title %}Transactions – Finova{% endblock %}

{% block content %}
<section class="flex min-h-screen flex-col gap-6 px-6 py-10">
    <div class="flex flex-wrap items-center justify-between gap-3">
        <div>
            <p class="text-sm uppercase tracking-[0.4em] text-slate-500">Finova</p>
            <h1 class="text-3xl font-bold text-white">Transactions</h1>
        </div>
        <a href="/" class="text-sm font-semibold text-accent">Back to dashboard</a>
    </div>
    <div class="rounded-3xl bg-slate-900/70 p-6 shadow-2xl">
        <div class="overflow-x-auto">
            <table class="min-w-full text-left text-sm text-slate-200">
                <thead>
                    <tr class="text-xs uppercase tracking-widest text-slate-500">
                        <th class="px-4 py-3">Title</th>
                        <th class="px-4 py-3">Category</th>
                        <th class="px-4 py-3">Date</th>
                        <th class="px-4 py-3">Status</th>
                        <th class="px-4 py-3">Amount</th>
                    </tr>
                </thead>
                <tbody id="transactionsBody" class="divide-y divide-white/5"></tbody>
            </table>
        </div>
    </div>
</section>
{% endblock %}
